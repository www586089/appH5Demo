<!DOCTYPE html>
<html>

<head>
    <style>
        div {
            width: 200px;
            height: 200px;
        }

        #box1 {
            background: red;
        }

        #box2 {
            width: 200px;
            height: 500px;
            background: green;
            position: relative;
            padding-left: 20px;
            padding-top: 20px;

            #father {
                width: 200px;
                height: 200px;
                background: rgb(19, 55, 86);
                /* position: relative; */
                /* position: fixed; */
                /* margin-left: 20px; */
                /* margin-top: 20px; */
                border: 1px solid khaki;

                #son {
                    width: 100px;
                    height: 100px;
                    background: darkblue;
                    position: absolute;
                    /* top: 10px; */
                    left: 10px;
                    top: 100px;
                    /* left: 100px; */
                }
            }
        }

        #box3 {
            background: blue;
        }

        #box {
            width: 50px;
            height: 200px;
            background: #160a5b;
            position: fixed;
            right: 0;
            margin-top: 100px;
            z-index: 1000;
        }
    </style>
</head>

<script>
    function changeStyle() {
        document.getElementById("box3").style.color="blue";
        document.getElementById("box3").style.fontFamily="Arial";
        document.getElementById("box3").style.fontSize="larger";
    }
    
    document.onload = function() {
        var x = document.getElementById("box3");
        x.addEventListener("click", myFunction);
        x.addEventListener("click", someOtherFunction);
    }

    function myFunction() {
        alert ("Hello World!")
    }
    function someOtherFunction() {
        alert ("函数已执行!")
    }

    function Person(name) {
        this.name = name;
    }

    var w=window.innerWidth
      || document.documentElement.clientWidth
      || document.body.clientWidth;
var h=window.innerHeight
      || document.documentElement.clientHeight
      || document.body.clientHeight;
x=document.getElementById("demo");
x.innerHTML="浏览器window宽度: " + w + ", 高度: " + h + "。"
Person.prototype.sayHello = function() {
    console.log("Hello, my name is " + this.name);
};

let bob = new Person("Bob");
bob.sayHello(); // 输出: Hello, my name is Bob

// 修改原型
Person.prototype.sayGoodbye = function() {
    console.log("Goodbye from " + this.name);
};

bob.sayGoodbye(); // 输出: Goodbye from Bob
bob.sayHello()
console.log('width = ' + screen.availWidth);
console.log('url = ' + location.href)
history.forward()
console.log(navigator.appCodeName);
</script>
